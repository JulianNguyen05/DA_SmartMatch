spring:
  application:
    name: smartmatch-api

  datasource:
    url: jdbc:mysql://localhost:3307/smartmatch_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  security:
    jwt:
      secret: your-very-long-secret-key-at-least-512-bits-smartmatch-2026
      expiration: 86400000
      refresh-expiration: 604800000

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    com.smartmatch: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE