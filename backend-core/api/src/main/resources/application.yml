spring:
  application:
    name: smartmatch-api

  datasource:
    # Đã đổi port từ 3307 sang 3306 (Port mặc định của MySQL local)
    url: jdbc:mysql://localhost:3306/smartmatch_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    password: 1234 # <-- LƯU Ý: Sửa lại thành mật khẩu MySQL Workbench của bạn (ví dụ: 123456, hoặc để trống '')
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  security:
    jwt:
      secret: your-very-long-secret-key-at-least-512-bits-smartmatch-2026
      expiration: 86400000
      refresh-expiration: 604800000

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080

logging:
  level:
    com.smartmatch: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE