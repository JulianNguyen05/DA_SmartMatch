spring:
  application:
    name: smartmatch-api

  # Database Configuration (MySQL)
  datasource:
    url: jdbc:mysql://localhost:3306/smartmatch_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update          # dev: update | test: validate | prod: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  # Security & JWT
  security:
    jwt:
      secret: your-very-long-secret-key-at-least-512-bits-smartmatch-2026
      expiration: 86400000        # 24 hours in milliseconds
      refresh-expiration: 604800000  # 7 days

server:
  port: 8080
  servlet:
    context-path: /api

# Logging
logging:
  level:
    com.smartmatch: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  packages-to-scan: com.smartmatch.api.controller

# Profiles
---
spring:
  config:
    activate:
      on-profile: dev

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://prod-db-host:3306/smartmatch_db?useSSL=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

logging:
  level:
    com.smartmatch: INFO
    org.hibernate.SQL: ERROR

server:
  port: 8080
  compression:
    enabled: true