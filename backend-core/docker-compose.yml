version: '3.9'

services:
  mysql:
    image: mysql:8.4
    container_name: smartmatch-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: smartmatch_db
      MYSQL_USER: smartmatch
      MYSQL_PASSWORD: smartmatch123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - smartmatch-network

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: smartmatch-phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root123
    ports:
      - "8081:80"
    networks:
      - smartmatch-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartmatch-api
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/smartmatch_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    volumes:
      - ./uploads:/app/uploads
    networks:
      - smartmatch-network

volumes:
  mysql_data:

networks:
  smartmatch-network:
    driver: bridge